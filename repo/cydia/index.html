<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nifty's Repo</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7fb;
      --panel: #ffffff;
      --text: #1f2330;
      --muted: #667085;
      --accent: #ed5cc7;
      --border: #e3e6ef;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11131a;
        --panel: #191c25;
        --text: #f3f4f8;
        --muted: #a7adbd;
        --border: #2a2f3d;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 520px);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .title {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    code {
      display: block;
      margin-top: 18px;
      padding: 12px;
      overflow-wrap: anywhere;
      border-radius: 8px;
      background: color-mix(in srgb, var(--border), transparent 45%);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <div class="title">
      <img src="CydiaIcon.png" alt="">
      <h1>Nifty's Repo</h1>
    </div>
    <p>Nifty’s repo for jailbreak files and utilities</p>
    <a class="button" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://niftyuwu.github.io/repo/cydia/">Add to Cydia</a>
    <code>https://niftyuwu.github.io/repo/cydia/</code>
  </main>
</body>
</html>
